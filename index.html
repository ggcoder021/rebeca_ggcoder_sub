<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="aurora">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex,nofollow">
<title>Aurora</title>
<style>
:root{--bg:#080b12;--card:rgba(18,23,34,.78);--card2:rgba(25,31,45,.62);--line:rgba(255,255,255,.09);--text:#f4f7fb;--muted:#8993a5;--accent:#7c8cff;--accent2:#50e3c2;--danger:#ff6b8b;--shadow:0 22px 70px rgba(0,0,0,.35)}
*{box-sizing:border-box}html{background:var(--bg)}body{margin:0;background:radial-gradient(900px 500px at 100% -10%,rgba(124,140,255,.16),transparent 60%),radial-gradient(700px 500px at 0% 50%,rgba(80,227,194,.08),transparent 60%),var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Tahoma,sans-serif;min-height:100vh}
button,input{font:inherit}button{cursor:pointer;border:0;color:inherit}.wrap{max-width:920px;margin:auto;padding:20px 16px 60px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;position:sticky;top:0;z-index:5;padding:10px 0;background:linear-gradient(var(--bg) 60%,transparent);backdrop-filter:blur(8px)}.brand{display:flex;align-items:center;gap:12px}.logo{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;color:#fff;font-size:23px;font-weight:900;box-shadow:0 10px 35px rgba(124,140,255,.3);animation:logoPulse 3s ease-in-out infinite}@keyframes logoPulse{0%,100%{transform:translateY(0) rotate(0);box-shadow:0 10px 35px rgba(124,140,255,.3)}50%{transform:translateY(-3px) rotate(2deg);box-shadow:0 16px 45px rgba(80,227,194,.24)}}.brand h1{font-size:20px;margin:0;font-weight:850}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}.actions{display:flex;gap:8px}.iconbtn,.btn{background:var(--card2);border:1px solid var(--line);border-radius:13px;padding:10px 13px;transition:.2s}.iconbtn:hover,.btn:hover{transform:translateY(-2px);border-color:rgba(124,140,255,.5);background:rgba(124,140,255,.12)}.hero{background:linear-gradient(135deg,rgba(124,140,255,.19),rgba(80,227,194,.08) 55%,var(--card));border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;width:220px;height:220px;border-radius:50%;background:rgba(124,140,255,.12);filter:blur(50px);left:-80px;top:-100px}.hero>*{position:relative;z-index:1}.hello{color:var(--muted);font-size:13px}.username{font-size:29px;font-weight:900;margin:4px 0 18px}.status{display:inline-flex;align-items:center;gap:7px;padding:7px 11px;border-radius:999px;background:rgba(80,227,194,.1);color:var(--accent2);font-size:12px;font-weight:700}.dot{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 14px currentColor}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:22px}.stat{background:rgba(0,0,0,.16);border:1px solid var(--line);border-radius:18px;padding:15px}.stat small{display:block;color:var(--muted);font-size:11px;margin-bottom:6px}.stat strong{font-size:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}.card{background:linear-gradient(145deg,var(--card),rgba(10,14,22,.5));border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,.15);transition:.25s;position:relative;overflow:hidden}.card:before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,255,255,.035),transparent 35%);pointer-events:none}.card:hover{transform:translateY(-2px);border-color:rgba(124,140,255,.25)}.card h2{font-size:15px;margin:0 0 14px;display:flex;justify-content:space-between;align-items:center}.subtle{color:var(--muted);font-size:12px}.search{width:100%;background:rgba(0,0,0,.18);border:1px solid var(--line);color:var(--text);border-radius:13px;padding:12px 14px;outline:none}.search:focus{border-color:var(--accent)}.filters{display:flex;gap:7px;flex-wrap:wrap;margin:11px 0}.chip{padding:7px 10px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--line);font-size:11px}.chip.active{background:rgba(124,140,255,.18);border-color:rgba(124,140,255,.55);color:#cfd4ff}.configs{display:flex;flex-direction:column;gap:8px;max-height:520px;overflow:auto}.config{display:flex;align-items:center;gap:9px;padding:11px;border:1px solid var(--line);border-radius:14px;background:rgba(0,0,0,.13)}.config input{accent-color:var(--accent)}.config-name{min-width:0;flex:1}.config-name strong{display:block;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.config-name small{display:block;color:var(--muted);font-size:10px;margin-top:3px}.mini{padding:7px 9px;border-radius:9px;background:rgba(255,255,255,.06);font-size:11px}.empty{text-align:center;color:var(--muted);padding:26px 8px;font-size:12px}.bulk{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.vpn-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}.vpn-list{display:flex;flex-direction:column;gap:9px}.vpn{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(0,0,0,.13)}.vpn-head{display:flex;justify-content:space-between;gap:10px;align-items:center}.vpn-title{font-weight:700;font-size:12px}.vpn-meta{color:var(--muted);font-size:10px;margin-top:4px}.vpn-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.wide{grid-column:1/-1}.footer{display:flex;justify-content:center;gap:8px;align-items:center;color:var(--muted);font-size:11px;margin-top:24px;padding:14px 18px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(135deg,rgba(124,140,255,.08),rgba(80,227,194,.04));box-shadow:0 12px 35px rgba(0,0,0,.16)}.footer a{transition:.2s}.footer a:hover{color:var(--accent2)!important;text-shadow:0 0 16px rgba(80,227,194,.5)}.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;background:#1b2230;border:1px solid var(--line);padding:11px 15px;border-radius:13px;font-size:12px;transition:.25s;z-index:20}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);display:none;place-items:center;padding:16px;z-index:10}.modal.show{display:grid}.modalbox{max-width:560px;width:100%;max-height:85vh;overflow:auto;background:#101521;border:1px solid var(--line);border-radius:22px;padding:18px}.modalhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.secret{white-space:pre-wrap;word-break:break-word;background:#080b12;border:1px solid var(--line);border-radius:13px;padding:13px;font-size:11px;direction:ltr;text-align:left;max-height:50vh;overflow:auto}.light{--bg:#eef1f8;--card:rgba(255,255,255,.8);--card2:rgba(255,255,255,.65);--line:rgba(20,30,60,.1);--text:#182033;--muted:#6d7588}.light body{background:var(--bg)}@media(max-width:700px){.grid{grid-template-columns:1fr}.wide{grid-column:auto}.stats{gap:7px}.stat{padding:12px 9px}.stat strong{font-size:15px}.hero{padding:19px}.username{font-size:25px}}
</style>
</head>
<body>
<div class="wrap">
<header class="top">
  <div class="brand"><div class="logo">A</div><div><h1 id="brand">Aurora</h1><p id="service">Subscription</p></div></div>
  <div class="actions"><button class="iconbtn" id="langBtn">EN</button><button class="iconbtn" id="themeBtn">☼</button></div>
</header>

<section class="hero">
  <div class="hello" data-fa="خوش اومدی" data-en="Welcome back">خوش اومدی</div>
  <div class="username" id="username">—</div>
  <span class="status"><span class="dot"></span><span id="status">Active</span></span>
  <div class="stats">
    <div class="stat"><small data-fa="مصرف شده" data-en="Used">مصرف شده</small><strong id="used">—</strong></div>
    <div class="stat"><small data-fa="باقی‌مانده" data-en="Remaining">باقی‌مانده</small><strong id="remaining">—</strong></div>
    <div class="stat"><small data-fa="انقضا" data-en="Expires">انقضا</small><strong id="expire">—</strong></div>
  </div>
</section>

<div class="grid">
<section class="card">
  <h2><span data-fa="اطلاعات اشتراک" data-en="Subscription">اطلاعات اشتراک</span><span class="subtle" id="online">0 online</span></h2>
  <div class="stat" style="margin-bottom:9px"><small data-fa="ریست حجم" data-en="Quota reset">ریست حجم</small><strong id="reset">—</strong></div>
  <div class="stat"><small data-fa="آخرین آنلاین" data-en="Last online">آخرین آنلاین</small><strong id="lastOnline">—</strong></div>
  <div class="bulk"><button class="btn" id="copySub">کپی لینک اشتراک</button><button class="btn" id="shareSub">اشتراک‌گذاری</button></div>
</section>

<section class="card">
  <h2><span data-fa="تنظیمات" data-en="Settings">تنظیمات</span></h2>
  <div class="subtle" data-fa="همه‌چیز داخل همین فایل و بدون CDN خارجی اجرا می‌شود." data-en="Everything runs inside this single file with no external CDN.">همه‌چیز داخل همین فایل و بدون CDN خارجی اجرا می‌شود.</div>
  <div class="bulk"><button class="btn" id="support">پشتیبانی</button><button class="btn" id="exportAll">خروجی همه</button></div>
</section>

<section class="card wide">
  <h2><span data-fa="کانفیگ‌ها" data-en="Configurations">کانفیگ‌ها</span><span class="subtle" id="configCount">0</span></h2>
  <input class="search" id="search" placeholder="جستجوی کانفیگ...">
  <div class="filters" id="filters"></div>
  <div class="configs" id="configs"></div>
  <div class="bulk"><button class="btn" id="copySelected">کپی انتخاب‌شده</button><button class="btn" id="copyAll">کپی همه</button><button class="btn" id="txtExport">TXT</button><button class="btn" id="jsonExport">JSON</button></div>
</section>

<section class="card wide" id="vpnCard" hidden>
  <h2><span data-fa="فایل‌های VPN" data-en="VPN Files">فایل‌های VPN</span><span class="subtle" id="vpnCount">0</span></h2>
  <div class="vpn-tabs" id="vpnTabs"></div>
  <div class="vpn-list" id="vpnList"></div>
</section>
</div>
<div class="footer"><span>✦</span><span id="footerBrand">Aurora</span><span>•</span><span data-fa="ساده، سریع، خفن" data-en="Simple. Fast. Clean.">ساده، سریع، خفن</span><span>•</span><a href="https://t.me/GGCODER_IR" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;font-weight:800">@GGCODER_IR</a></div>
</div>

<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="modalbox"><div class="modalhead"><strong id="modalTitle">Details</strong><button class="iconbtn" id="closeModal">×</button></div><pre class="secret" id="modalBody"></pre><div class="bulk"><button class="btn" id="modalCopy">کپی</button><button class="btn" id="modalDownload">دانلود</button></div></div></div>

<!-- Rebecca data island: only flat bindings and links are used. -->
<div id="aurora-data" hidden
 data-username="{{ user.username }}"
 data-status="{{ user.status }}"
 data-used="{{ user.used_traffic }}"
 data-limit="{{ user.data_limit }}"
 data-reset-strategy="{{ user.data_limit_reset_strategy }}"
 data-expire="{{ user.expire }}"
 data-remaining-days="{{ remaining_days }}"
 data-subscription-url="{{ user.subscription_url }}"
 data-support-url="{{ support_url }}"
 data-brand-name="{{ brand_name }}"
 data-profile-title="{{ subscription_profile_title }}"
 data-online-count="{{ user.online_count }}"
 data-online-at="{{ user.online_at }}"
 data-created-at="{{ user.created_at }}"
 data-service-name="{{ user.service_name }}">
<script type="text/plain" id="aurora-links">{% for link in links %}{{ link }}
{% endfor %}</script>
</div>

<script>
(function(){
"use strict";
const data=document.getElementById("aurora-data"), linksText=document.getElementById("aurora-links").textContent.trim();
const state={lang:localStorage.getItem("aurora_lang")||"fa",theme:localStorage.getItem("aurora_theme")||"dark",filter:"all",search:"",configs:[],vpn:{},modal:null};
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const safe=v=>String(v??"").trim();
const n=v=>{const x=Number(v);return Number.isFinite(x)?x:0};
const fmtBytes=b=>{b=n(b);if(!b)return "0 B";const u=["B","KB","MB","GB","TB"];let i=0;while(b>=1024&&i<u.length-1){b/=1024;i++}return `${b.toFixed(b>=10||i===0?0:1)} ${u[i]}`};
const date=v=>{if(!n(v))return "—";try{return new Intl.DateTimeFormat(state.lang==="fa"?"fa-IR":"en-US",{dateStyle:"medium"}).format(new Date(n(v)*1000))}catch{return "—"}};
const txt=(fa,en)=>state.lang==="fa"?fa:en;
const toast=m=>{const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove("show"),2200)};
const copy=async x=>{try{await navigator.clipboard.writeText(x);toast(txt("کپی شد","Copied"))}catch{toast(txt("کپی ناموفق بود","Copy failed"))}};
const download=(name,content,type="text/plain")=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)};
const protocol=x=>{const m=String(x).match(/^([a-z0-9+.-]+):/i);return m?m[1].toLowerCase():"other"};
const label=x=>({vless:"VLESS",vmess:"VMess",trojan:"Trojan",ss:"Shadowsocks",socks:"SOCKS",http:"HTTP",wireguard:"WireGuard",openvpn:"OpenVPN"}[x]||x.toUpperCase());
function apply(){
 document.documentElement.lang=state.lang;document.documentElement.dir=state.lang==="fa"?"rtl":"ltr";
 document.documentElement.classList.toggle("light",state.theme==="light");
 $("#langBtn").textContent=state.lang==="fa"?"EN":"FA";
 $$("[data-fa]").forEach(e=>e.textContent=e.dataset[state.lang]);
}
function init(){
 const brand=safe(data.dataset.profileTitle)||safe(data.dataset.brandName)||"Aurora";
 $("#brand").textContent=brand;$("#footerBrand").textContent=brand;document.title=brand;
 $("#service").textContent=safe(data.dataset.serviceName)||"Subscription";
 $("#username").textContent=safe(data.dataset.username)||"—";
 $("#status").textContent=txt(safe(data.dataset.status)||"Active",safe(data.dataset.status)||"Active");
 const used=n(data.dataset.used),limit=n(data.dataset.limit);
 $("#used").textContent=fmtBytes(used);
 $("#remaining").textContent=limit?fmtBytes(Math.max(0,limit-used)):txt("نامحدود","Unlimited");
 $("#expire").textContent=n(data.dataset.expire)?date(data.dataset.expire):txt("بدون انقضا","Never");
 $("#reset").textContent=safe(data.dataset.resetStrategy)||"—";
 $("#online").textContent=`${n(data.dataset.onlineCount)} online`;
 $("#lastOnline").textContent=date(data.dataset.onlineAt);
 state.configs=linksText?linksText.split(/\r?\n/).map(s=>s.trim()).filter(Boolean):[];
 renderFilters();renderConfigs();apply();loadVPN();
}
function renderFilters(){
 const types=["all",...new Set(state.configs.map(protocol))];
 $("#filters").innerHTML=types.map(t=>`<button class="chip ${state.filter===t?"active":""}" data-filter="${t}">${t==="all"?txt("همه","All"):label(t)}</button>`).join("");
 $$("#filters .chip").forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;renderFilters();renderConfigs()});
}
function renderConfigs(){
 const q=state.search.toLowerCase();
 const arr=state.configs.map((url,i)=>({url,i,p:protocol(url)})).filter(x=>(state.filter==="all"||x.p===state.filter)&&(!q||x.url.toLowerCase().includes(q)));
 $("#configCount").textContent=state.configs.length;
 $("#configs").innerHTML=arr.length?arr.map(x=>`<label class="config"><input type="checkbox" data-i="${x.i}"><div class="config-name"><strong>${label(x.p)} #${x.i+1}</strong><small>${escapeHtml(x.url)}</small></div><button type="button" class="mini" data-copy="${x.i}">${txt("کپی","Copy")}</button><button type="button" class="mini" data-view="${x.i}">⌁</button></label>`).join(""):`<div class="empty">${txt("کانفیگی وجود ندارد","No configurations found")}</div>`;
 $$("[data-copy]").forEach(b=>b.onclick=e=>{e.preventDefault();copy(state.configs[n(b.dataset.copy)])});
 $$("[data-view]").forEach(b=>b.onclick=e=>{e.preventDefault();openModal("Config",state.configs[n(b.dataset.view)])});
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
async function loadVPN(){
 const sub=safe(data.dataset.subscriptionUrl);if(!sub)return;
 try{const r=await fetch(sub.replace(/\/$/,"")+"/info",{credentials:"same-origin"});if(!r.ok)return;const j=await r.json();state.vpn=j;renderVPN()}catch{}
}
function renderVPN(){
 const groups=[];
 const ov=state.vpn.openvpn||state.vpn.ov;
 if(ov?.profiles?.length)groups.push(["openvpn",ov.profiles]);
 if(state.vpn.wireguard?.profiles?.length)groups.push(["wireguard",state.vpn.wireguard.profiles]);
 if(state.vpn.l2tp?.length)groups.push(["l2tp",state.vpn.l2tp]);
 if(state.vpn.pptp?.length)groups.push(["pptp",state.vpn.pptp]);
 if(!groups.length)return;
 $("#vpnCard").hidden=false;$("#vpnCount").textContent=groups.reduce((a,x)=>a+x[1].length,0);
 $("#vpnTabs").innerHTML=groups.map((g,i)=>`<button class="chip ${i===0?"active":""}" data-vtab="${g[0]}">${label(g[0])} · ${g[1].length}</button>`).join("");
 let active=groups[0][0];
 const draw=()=>{ $$("#vpnTabs .chip").forEach(x=>x.classList.toggle("active",x.dataset.vtab===active));const g=groups.find(x=>x[0]===active);$("#vpnList").innerHTML=g[1].map((p,i)=>vpnCard(active,p,i)).join("");bindVPN() };
 $$("#vpnTabs .chip").forEach(x=>x.onclick=()=>{active=x.dataset.vtab;draw()});draw();
}
function vpnCard(type,p,i){
 const title=safe(p.remark)||safe(p.host_name)||safe(p.filename)||`${label(type)} #${i+1}`;
 const body=p.body||p.link||p.download_url||"";
 return `<div class="vpn"><div class="vpn-head"><div><div class="vpn-title">${escapeHtml(title)}</div><div class="vpn-meta">${escapeHtml(safe(p.server)||safe(p.host_name)||"VPN profile")}</div></div><span class="chip">${label(type)}</span></div><div class="vpn-actions">${p.download_url?`<button class="mini" data-vdownload="${i}" data-type="${type}">↓ ${txt("دانلود","Download")}</button>`:""}${body?`<button class="mini" data-vcopy="${i}" data-type="${type}">${txt("کپی","Copy")}</button>`:""}${p.link?`<button class="mini" data-vopen="${i}" data-type="${type}">⌁</button>`:""}</div></div>`;
}
function currentProfiles(type){const x=type==="openvpn"?(state.vpn.openvpn||state.vpn.ov):state.vpn[type];return x?.profiles||x||[]}
function bindVPN(){
 $$("[data-vcopy]").forEach(b=>b.onclick=()=>{const p=currentProfiles(b.dataset.type)[n(b.dataset.vcopy)];copy(p.body||p.link||p.download_url||"")});
 $$("[data-vopen]").forEach(b=>b.onclick=()=>{const p=currentProfiles(b.dataset.type)[n(b.dataset.vopen)];openModal(label(b.dataset.type),p.link||p.body||"")});
 $$("[data-vdownload]").forEach(b=>b.onclick=()=>{const p=currentProfiles(b.dataset.type)[n(b.dataset.vdownload)];if(p.download_url)window.open(p.download_url,"_blank")});
}
function selected(){return $$('input[type="checkbox"][data-i]:checked').map(x=>state.configs[n(x.dataset.i)])}
function openModal(title,body){state.modal={title,body};$("#modalTitle").textContent=title;$("#modalBody").textContent=body;$("#modal").classList.add("show")}
function closeModal(){$("#modal").classList.remove("show");state.modal=null}
$("#search").oninput=e=>{state.search=e.target.value;renderConfigs()};
$("#copyAll").onclick=()=>copy(state.configs.join("\n"));
$("#copySelected").onclick=()=>copy(selected().join("\n"));
$("#txtExport").onclick=()=>download("configs.txt",state.configs.join("\n"));
$("#jsonExport").onclick=()=>download("configs.json",JSON.stringify(state.configs,null,2),"application/json");
$("#exportAll").onclick=()=>download("aurora-configs.txt",state.configs.join("\n"));
$("#copySub").onclick=()=>copy(safe(data.dataset.subscriptionUrl));
$("#shareSub").onclick=()=>{const u=safe(data.dataset.subscriptionUrl);navigator.share?navigator.share({title:$("#brand").textContent,url:u}):copy(u)};
$("#support").onclick=()=>{const u=safe(data.dataset.supportUrl);if(u)window.open(u,"_blank");else toast(txt("لینک پشتیبانی تنظیم نشده","Support URL is not configured"))};
$("#langBtn").onclick=()=>{state.lang=state.lang==="fa"?"en":"fa";localStorage.setItem("aurora_lang",state.lang);apply();renderFilters();renderConfigs()};
$("#themeBtn").onclick=()=>{state.theme=state.theme==="light"?"dark":"light";localStorage.setItem("aurora_theme",state.theme);apply()};
$("#closeModal").onclick=closeModal;$("#modal").onclick=e=>{if(e.target.id==="modal")closeModal()};
$("#modalCopy").onclick=()=>copy(state.modal?.body||"");
$("#modalDownload").onclick=()=>download("aurora-export.txt",state.modal?.body||"");
init();
})();
</script>
</body>
</html>
